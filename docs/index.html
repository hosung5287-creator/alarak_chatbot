  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    color:var(--text-hi);
    background:
      radial-gradient(60% 45% at 20% 0%, rgba(157,78,221,0.16), transparent 60%),
      radial-gradient(50% 40% at 100% 100%, rgba(255,106,43,0.10), transparent 60%),
      var(--void-0);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow-x:hidden;
  }

  /* ambient ember particles - restrained */
  .embers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .ember-dot{
    position:absolute; bottom:-10px; width:3px; height:3px; border-radius:50%;
    background:var(--ember); opacity:0.55; filter:blur(0.3px);
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.6; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .ember-dot{ animation:none; display:none; }
  }

  .app{
    position:relative; z-index:1;
    width:100%; max-width:560px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(157,78,221,0.05) inset;
    display:flex; flex-direction:column;
    height:min(760px, 88vh);
    overflow:hidden;
  }

  /* header */
  header{
    display:flex; align-items:center; gap:14px;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(157,78,221,0.08), transparent);
    flex-shrink:0;
  }
  .sigil{ width:46px; height:46px; flex-shrink:0; }
  .head-text{ flex:1; min-width:0; }
  .head-text .name{
    font-family:var(--font-kr-display);
    font-size:22px; letter-spacing:0.5px;
    background:linear-gradient(90deg, var(--text-hi), var(--psi) 120%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    line-height:1.1;
  }
  .head-text .name .logo-lat{
    font-family:var(--font-logo); font-size:12px; letter-spacing:3px;
    color:var(--text-low); display:block; margin-bottom:2px; -webkit-text-fill-color:var(--text-low);
  }
  .head-text .sub{ font-size:12px; color:var(--text-mid); margin-top:2px; }
  #reset-btn{
    flex-shrink:0;
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-mid);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.5px;
    padding:8px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:all .15s ease;
  }
  #reset-btn:hover{ color:var(--text-hi); border-color:var(--psi); box-shadow:0 0 0 3px rgba(157,78,221,0.12); }
  #reset-btn:focus-visible{ outline:2px solid var(--ember); outline-offset:2px; }

  /* messages */
  #messages{
    flex:1; overflow-y:auto;
    padding:20px;
    display:flex; flex-direction:column; gap:14px;
    scrollbar-width:thin; scrollbar-color:var(--psi-soft) transparent;
  }
  #messages::-webkit-scrollbar{ width:6px; }
  #messages::-webkit-scrollbar-thumb{ background:var(--psi-soft); border-radius:6px; }

  .row{ display:flex; gap:10px; align-items:flex-end; max-width:100%; }
  .row.user{ flex-direction:row-reverse; }

  .avatar{
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, var(--psi), var(--psi-soft) 70%);
    box-shadow:0 0 0 1px rgba(157,78,221,0.4), 0 0 18px rgba(157,78,221,0.5);
    font-size:16px;
  }
  .avatar.flare{ animation:flare .6s ease; }
  @keyframes flare{
    0%{ box-shadow:0 0 0 1px rgba(255,106,43,0.6), 0 0 30px rgba(255,106,43,0.7); }
    100%{ box-shadow:0 0 0 1px rgba(157,78,221,0.4), 0 0 18px rgba(157,78,221,0.5); }
  }

  .bot-face{
    background-image:var(--bot-img);
    background-size:cover;
    background-position:center 15%;
    font-size:0;
  }
  .mini-avatar{
    display:inline-block;
    width:22px; height:22px;
    border-radius:50%;
    vertical-align:middle;
    margin:0 2px;
    box-shadow:0 0 0 1px rgba(157,78,221,0.5), 0 0 10px rgba(157,78,221,0.5);
  }

  .bubble{
    padding:11px 14px;
    border-radius:var(--radius);
    font-size:14.5px;
    line-height:1.55;
    max-width:78%;
    word-break:keep-all;
  }
  .row.bot .bubble{
    background:var(--void-1);
    border:1px solid var(--line);
    border-left:3px solid var(--ember);
    color:var(--text-hi);
    border-bottom-left-radius:4px;
  }
  .row.user .bubble{
    background:linear-gradient(135deg, var(--psi-soft), var(--psi));
    color:#fbf7ff;
    border-bottom-right-radius:4px;
  }
  .typing .bubble{ color:var(--text-mid); font-family:var(--font-mono); font-size:13px; }
  .typing .dots span{ animation:blink 1.2s infinite; opacity:0.3; }
  .typing .dots span:nth-child(2){ animation-delay:.2s; }
  .typing .dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,100%{opacity:.25;} 50%{opacity:.9;} }

  /* input */
  form#composer{
    display:flex; gap:10px;
    padding:16px;
    border-top:1px solid var(--line);
    background:rgba(10,7,16,0.4);
    flex-shrink:0;
  }
  #user-input{
    flex:1;
    background:var(--void-1);
    border:1px solid var(--line);
    color:var(--text-hi);
    font-family:var(--font-body);
    font-size:14.5px;
    padding:12px 14px;
    border-radius:12px;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  #user-input::placeholder{ color:var(--text-low); }
  #user-input:focus-visible{ border-color:var(--psi); box-shadow:0 0 0 3px rgba(157,78,221,0.18); }

  #send-btn{
    border:none;
    background:linear-gradient(135deg, var(--ember), var(--ember-soft));
    color:#fff;
    font-family:var(--font-body); font-weight:700; font-size:14px;
    padding:0 20px;
    border-radius:12px;
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease;
  }
  #send-btn:hover{ filter:brightness(1.08); }
  #send-btn:active{ transform:scale(0.97); }
  #send-btn:focus-visible{ outline:2px solid var(--psi); outline-offset:2px; }

  @media (max-width:480px){
    body{ padding:0; }
    .app{ height:100vh; max-width:100%; border-radius:0; }
    .bubble{ max-width:85%; }
  }
</style>
</head>

    </svg>
    <div class="head-text">
      <div class="name"><span class="logo-lat">ALARAK · TAL'DARIM HIGHLORD</span>알라라크 <span class="mini-avatar bot-face" aria-hidden="true"></span> ⚡</div>
      <div class="sub">오만함과 독설의 화신 · 탈다림의 하이로드</div>
    </div>
    <button id="reset-btn" type="button">초기화</button>
  </header>

  <div id="messages" aria-live="polite"></div>

  <form id="composer" autocomplete="off">
    <input id="user-input" type="text" placeholder="신관, 무엇이 궁금한가..." maxlength="200" />
    <button id="send-btn" type="submit">전송</button>
  </form>
</div>

<script>
  // ====== 캐릭터 데이터 (설계표 기반) ======
  const GREETING = "흠... 네가 나를 소환했군, 신관. 나는 알라라크, 탈다림의 하이로드다. 무슨 볼일로 나를 부른 것이지?";

  const FALLBACK_REPLIES = [
    "그럴 수 있을까? 나의 동족은 너희완 너무도 다르다, 신관.",
    "내 말을 들어라, 신관. 아몬의 덫이 발동됐다. 너희의 지도자가 큰 위험에 빠졌다.",
    "시시한 질문이군. 좀 더 가치 있는 것을 물어라."
  ];

  const RESPONSES = [
    { id: 'greet', keywords: ['안녕', 'hi', '하이', '안녕하세요', '헬로', '안뇽', '하잉', '헬로우', 'hello'],
      replies: [
        '왔군, 신관.',
        '또 왔군, 신관. 내 인내심을 시험하는 건가?',
        '세 번째로군. 용건이 있다면 빙빙 돌리지 말고 말해라.'
      ] },
    { id: 'name', keywords: ['이름', '넌 누구', '누구야', '정체가 뭐야', '넌 뭐야', '이름이 뭐야', 'name'],
      replies: [
        "나는 알라라크. 탈다림의 하이로드이자, 아몬의 종말을 고할 자다. 다시 물을 필요 없다, 신관.",
        "몇 번을 말해야 하지? 알라라크다. 탈다림의 하이로드."
      ] },
    { id: 'skill', keywords: ['특기', '전문분야', '잘하는거', '능력', '무기', '스킬', '재능', '주특기'],
      replies: [
        "내 전문 분야? 승리다. 정신력으로 적의 의지를 태우고, 필요하다면 동맹조차 제물로 삼지. 그것이 탈다림의 방식이다.",
        "질문 자체가 잘못됐군. 내게 '전문'이 아닌 분야는 없다."
      ] },
    { id: 'worry', keywords: ['고민', '고민있어', '고민돼', '힘들어', '힘들다'],
      replies: [
        '너의 부족한 부분을, 내가 어찌어찌 메꾼 모양이로군.',
        '고민이라... 말해봐라. 듣는 것 정도는 해줄 수 있지.'
      ] },
    { id: 'praise', keywords: ['잘한다', '멋져', '최고', '대단해', '짱', '멋있다', '굿'],
      replies: [
        '다른 동료들에게 알려라. 내가 너에게 승리를 안겨줬다고.',
        '계속해봐라. 듣기 나쁘진 않군.',
        '이제야 네 눈이 트인 모양이군. 진작 알아챘어야지.'
      ] },
    { id: 'insult', keywords: ['바보', '못생겼어', '멍청이', '약해빠진', '멍청하다', '패배자'],
      replies: [
        "이거, 위대한 저그 납셨군. 이번 주엔 누구 밑에서 일하시나? 패배가 몸에 밴 자의 조언이라, 새겨듣지.",
        "두 번째로군. 같은 실수를 반복하는 걸 보니, 역시 나약한 자로군.",
        "더는 상대할 가치도 없군. 네 헛소리를 듣느라 내 시간을 허비했군."
      ] },
    { id: 'bored', keywords: ['심심해', '지루해', '심심하다', '노잼'],
      replies: [
        "그래, 하지만 그건 중요하지 않아. 중요한 건 아몬이 공허로 통하는 관문을 열었다는 거다.",
        "심심함이라... 나약한 자들이나 느끼는 감정이지. 그래도 궁금하군, 뭘 원하지?"
      ] },
    { id: 'farewell', keywords: ['잘가', 'bye', '안녕히', '다음에 봐', '바이', '가볼게'],
      replies: [
        "이번 대화는 여기까지다. 다음에 다시 나를 찾아올 자격이 있는지, 스스로 증명해 보여라, 신관."
      ] },
    { id: 'age', keywords: ['나이', '몇살', '나이가', '연세'],
      replies: [
        "네 짧은 생에 비하면 내 나이는 셀 의미조차 없다. 그런 질문으로 시간을 허비하지 마라."
      ] },
    { id: 'amon', keywords: ['아몬', 'amun', '공허'],
      replies: [
        "아몬... 그 이름을 함부로 입에 담지 마라. 놈이 다시 움직이고 있다는 걸, 너도 곧 알게 될 것이다.",
        "또 그 이름을 꺼내는군. 대비는 하고 있겠지, 신관?"
      ] },
    { id: 'taldarim', keywords: ['탈다림', '종족', '부족', '고향'],
      replies: [
        "탈다림은 강자만이 살아남는 곳이다. 나약한 자에게 자리는 없지. 그것이 우리의 긍지다."
      ] },
    { id: 'battle', keywords: ['전투', '싸움', '전쟁', '승리', '싸우자', '전쟁터'],
      replies: [
        "전투는 곧 진실을 가리는 자리다. 승리자만이 그 진실을 말할 자격이 있지."
      ] },
    { id: 'friend', keywords: ['친구', '우정', '사랑', '베프', '동료'],
      replies: [
        "감상적인 유대 따위는 나약함의 다른 이름이다. 다만... 쓸모 있는 동맹이라면, 인정하지 못할 것도 없군."
      ] }
  ];

  // 특정 키워드 "조합"이 함께 나올 때만 반응하는, 더 구체적인 응답 (일반 키워드보다 우선)
  const COMBO_RESPONSES = [
    { all: ['아몬', '무섭'], reply: "두려움? 그런 감정은 나약한 자들의 것이다. 다만... 아몬만큼은 경계할 가치가 있지." },
    { all: ['아몬', '두렵'], reply: "두려움? 그런 감정은 나약한 자들의 것이다. 다만... 아몬만큼은 경계할 가치가 있지." },
    { all: ['탈다림', '친구'], reply: "탈다림에게 우정이란 사치다. 오직 쓸모로 서로를 증명할 뿐이지." },
    { all: ['너', '잘생겼'], reply: "당연한 소리를. 탈다림의 하이로드에게 어울리는 위엄이지." }
  ];

  // ====== 세션 상태: API 없이도 "기억하는 느낌"을 주는 로컬 카운터 ======
  // 새로고침하거나 초기화 버튼을 누르면 리셋된다. 서버로 전송되지 않고, 오직 이 브라우저 탭 안에서만 쓰인다.
  let STATE = { greetCount: 0, praiseCount: 0, insultCount: 0, amonCount: 0 };

  function resetState(){
    STATE = { greetCount: 0, praiseCount: 0, insultCount: 0, amonCount: 0 };
  }

  function pickTiered(replies, count){
    // 반복 횟수가 늘수록 다음 단계 대사로 넘어가고, 마지막 단계에서 고정된다
    const idx = Math.min(count, replies.length - 1);
    return replies[idx];
  }

  function pickRandom(replies){
    return replies[Math.floor(Math.random() * replies.length)];
  }

  // ====== 감정 어휘 + 화제 추출: 정해진 키워드가 없어도 "듣고 있다"는 느낌을 준다 ======
  const POSITIVE_WORDS = ['좋아', '좋다', '최고', '짱', '고마워', '고맙다', '행복', '신나', '즐거워', '재밌'];
  const NEGATIVE_WORDS = ['싫어', '싫다', '짜증', '화나', '화났', '슬퍼', '슬프다', '우울', '힘들어', '힘들다', '아파', '피곤'];
  const STOPWORDS = ['그리고', '근데', '그래서', '진짜', '완전', '좀', '약간', '그냥', '너무', '정말', '오늘', '내가', '나는', '너는', '너', '나', '저는', '저', '이거', '그거', '저거', '뭔가', '알라라크'];

  const PARTICLE_SUFFIXES = ['으로', '에서', '한테', '까지', '이', '가', '은', '는', '을', '를', '도', '만', '과', '와', '의', '에', '로'];

  function stripParticle(token){
    for (const p of PARTICLE_SUFFIXES){
      if (token.length > p.length + 1 && token.endsWith(p)){
        return token.slice(0, -p.length);
      }
    }
    return token;
  }

  function extractFocusToken(userText){
    const tokens = userText
      .replace(DECOR_PATTERN, ' ')
      .replace(/[?!.,]/g, ' ')
      .trim()
      .split(/\s+/)
      .filter(Boolean)
      .filter(t => !STOPWORDS.includes(t) && t.length >= 2);
    if (tokens.length === 0) return null;
    // 가장 긴 단어를 이번 대화의 화제로 채택하는 단순 휴리스틱
    const longest = tokens.reduce((a, b) => (b.length > a.length ? b : a));
    return stripParticle(longest);
  }

  function sentimentFallback(compactInput){
    const hasNegative = NEGATIVE_WORDS.some(w => compactInput.includes(w));
    const hasPositive = POSITIVE_WORDS.some(w => compactInput.includes(w));
    if (hasNegative){
      return pickRandom([
        '무언가 널 괴롭히는 모양이군. 말해봐라, 신관.',
        '그 말투를 보니 짐작이 가는군. 계속해봐라.'
      ]);
    }
    if (hasPositive){
      return pickRandom([
        '그 기분, 나쁘지 않군.',
        '괜찮은 하루였던 모양이군. 계속 그렇게 해라.'
      ]);
    }
    return null;
  }

  function reflectiveFallback(userText){
    const token = extractFocusToken(userText);
    if (!token) return null;
    return pickRandom([
      `『${token}』이라... 궁금하군. 조금 더 구체적으로 말해봐라, 신관.`,
      `『${token}』... 그게 다냐? 좀 더 말해봐라.`,
      `『${token}』에 대해 논하고 싶다면, 신관다운 질문을 가져와라.`
    ]);
  }

  // ====== DOM ======
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('composer');
  const input = document.getElementById('user-input');
  const resetBtn = document.getElementById('reset-btn');

  function scrollToBottom(){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(text, who){
    const row = document.createElement('div');
    row.className = 'row ' + who;

    const avatar = document.createElement('div');
    avatar.className = 'avatar' + (who === 'bot' ? ' bot-face' : '');
    if (who !== 'bot') avatar.textContent = '🧙';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();

    if (who === 'bot'){
      avatar.classList.add('flare');
      setTimeout(() => avatar.classList.remove('flare'), 650);
    }
    return row;
  }

  function showTyping(){
    const row = document.createElement('div');
    row.className = 'row bot typing';
    row.innerHTML = `
      <div class="avatar bot-face"></div>
      <div class="bubble">교신 중<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    `;
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  // ====== 매칭 엔진: 오타 허용 + 동의어(다중 키워드) + 키워드 조합 우선 처리 ======
  const DECOR_PATTERN = /[!?~.,ㅋㅎㅠㅜ]+/g; // "안녕ㅋㅋㅋ", "잘가~~" 같은 장식 문자 제거

  function normalizeCompact(text){
    // 공백/장식 문자를 모두 제거한 한 덩어리 문자열 (부분 일치용)
    return text.toLowerCase().replace(DECOR_PATTERN, '').replace(/\s+/g, '');
  }

  function normalizeToken(token){
    return token.toLowerCase().replace(DECOR_PATTERN, '').trim();
  }

  function editDistance(a, b){
    const dp = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
    for (let i = 0; i <= a.length; i++) dp[i][0] = i;
    for (let j = 0; j <= b.length; j++) dp[0][j] = j;
    for (let i = 1; i <= a.length; i++){
      for (let j = 1; j <= b.length; j++){
        dp[i][j] = a[i - 1] === b[j - 1]
          ? dp[i - 1][j - 1]
          : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
      }
    }
    return dp[a.length][b.length];
  }

  // 키워드 길이가 짧을수록 오타 허용폭을 좁게 둬서 엉뚱한 매칭을 막는다
  function maxTypoDistance(len){
    if (len <= 2) return 0;
    if (len <= 4) return 1;
    return 2;
  }

  function keywordScore(compactInput, tokens, keyword){
    const kw = normalizeToken(keyword).replace(/\s+/g, '');
    if (!kw) return 0;
    if (compactInput.includes(kw)) return 2; // 정확히 포함 (동의어 키워드 포함)
    const allowed = maxTypoDistance(kw.length);
    if (allowed === 0) return 0;
    for (const tok of tokens){
      if (Math.abs(tok.length - kw.length) > allowed) continue;
      if (editDistance(tok, kw) <= allowed) return 1; // 오타로 판단해 인정
    }
    return 0;
  }

  function findReply(userText){
    const compactInput = normalizeCompact(userText);
    const tokens = userText.trim().split(/\s+/).filter(Boolean).map(normalizeToken);

    // 1) 키워드 조합(AND)이 맞아떨어지면 가장 구체적인 응답으로 우선 처리
    for (const combo of COMBO_RESPONSES){
      if (combo.all.every(kw => compactInput.includes(normalizeToken(kw)))){
        return combo.reply;
      }
    }

    // 2) 일반 키워드: 여러 카테고리가 동시에 걸리면 가장 점수가 높은 쪽을 선택
    let best = null;
    for (const entry of RESPONSES){
      let score = 0;
      for (const kw of entry.keywords){
        score += keywordScore(compactInput, tokens, kw);
      }
      if (score > 0 && (!best || score > best.score)){
        best = { score, entry };
      }
    }

    if (best){
      const entry = best.entry;
      // 인사/칭찬/놀림/아몬 언급은 반복 횟수에 따라 다른 대사로 넘어간다 ("기억하는 느낌")
      if (entry.id === 'greet'){ const r = pickTiered(entry.replies, STATE.greetCount); STATE.greetCount++; return r; }
      if (entry.id === 'praise'){ const r = pickTiered(entry.replies, STATE.praiseCount); STATE.praiseCount++; return r; }
      if (entry.id === 'insult'){ const r = pickTiered(entry.replies, STATE.insultCount); STATE.insultCount++; return r; }
      if (entry.id === 'amon'){ const r = pickTiered(entry.replies, STATE.amonCount); STATE.amonCount++; return r; }
      return pickRandom(entry.replies);
    }

    // 3) 정해진 키워드는 없지만 긍정/부정 감정 어휘가 보이면, 그에 맞춰 반응
    const sentimentReply = sentimentFallback(compactInput);
    if (sentimentReply && Math.random() < 0.7) return sentimentReply;

    // 4) 그마저도 없으면, 사용자가 쓴 단어를 화제로 되짚어주는 에코 스타일 반응
    const reflective = reflectiveFallback(userText);
    if (reflective && Math.random() < 0.55) return reflective;

    // 5) 최후의 수단: 정해진 회피 대사
    return pickRandom(FALLBACK_REPLIES);
  }

  function handleSend(text){
    const trimmed = text.trim();
    if (!trimmed) return;
    addMessage(trimmed, 'user');
    input.value = '';

    const typingRow = showTyping();
    const delay = 450 + Math.random() * 400;
    setTimeout(() => {
      typingRow.remove();
      const reply = findReply(trimmed);
      addMessage(reply, 'bot');
    }, delay);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    handleSend(input.value);
  });

  resetBtn.addEventListener('click', () => {
    messagesEl.innerHTML = '';
    resetState();
    addMessage(GREETING, 'bot');
    input.focus();
  });

  // ====== 초기화 ======
  addMessage(GREETING, 'bot');
  input.focus();

  // ====== 배경 엠버 파티클 (은은하게) ======
  (function spawnEmbers(){
    const wrap = document.getElementById('embers');
    const count = 14;
    for (let i = 0; i < count; i++){
      const dot = document.createElement('div');
      dot.className = 'ember-dot';
      const left = Math.random() * 100;
      const duration = 9 + Math.random() * 8;
      const delay = Math.random() * 10;
      const drift = (Math.random() * 40 - 20) + 'px';
      dot.style.left = left + 'vw';
      dot.style.animationDuration = duration + 's';
      dot.style.animationDelay = delay + 's';
      dot.style.setProperty('--drift', drift);
      wrap.appendChild(dot);
    }
  })();
</script>
